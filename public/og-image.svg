    <radialGradient id="glow" cx="22%" cy="20%" r="55%">
      <stop offset="0" stop-color="#ff9b5c" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ff9b5c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#fff8ef" stroke-opacity="0.055"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
